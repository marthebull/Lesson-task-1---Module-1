<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Guitar Kings  |  Contact</title>
        <meta charset="utf-8">
        <meta name="description" content="Get real authentic, hand-crafted guitars from Guitar Kings">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
            <a class="logo" href="index.html">Guitar Kings</a>
            <nav>
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="guitars.html">GUITARS</a></li>
                    <li><a class="current" href="contact.html">CONTACT</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <h1>Contact us</h1>
            <form>
                <fieldset>
                    <legend>CONTACT</legend>
                    <input class="form-input" placeholder="Full name" type="text" id="name">
                    <input class="form-input" placeholder="Email" type="email" id="email">
                    <select class="form-input" name="Guitar" id="select-product">
                        <option value="product-one">Rock n roll</option>
                        <option value="product-two">Rock n roll</option>
                        <option value="product-three">Rock n roll</option>
                    </select>
                    <input class="form-input" type="text" id="message" placeholder="Your message">
                    <input class="form-checkbox" type="checkbox" id="sign-up">
                    <label class="form-checkbox" for="sign-up">Sign up for our newsletter</label>
                    <button class="form-input" type="submit">Send</button>
                </fieldset>

            </form>
        </main>
        <footer>
            Copyright &copy;
        </footer>
    </body>
</html>
